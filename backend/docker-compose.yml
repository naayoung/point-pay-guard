services:
  postgres:
    image: postgres:16-alpine
    container_name: pointpay-postgres
    environment:
      POSTGRES_DB: ${POINTPAY_DB_NAME:-pointpay}
      POSTGRES_USER: ${POINTPAY_DB_USERNAME:-pointpay}
      POSTGRES_PASSWORD: ${POINTPAY_DB_PASSWORD:-pointpay}
    ports:
      - "${POINTPAY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pointpay-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pointpay-redis
    ports:
      - "${POINTPAY_REDIS_PORT:-6379}:6379"

volumes:
  pointpay-postgres-data:
